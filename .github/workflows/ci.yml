name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install backend deps
        run: |
          cd backend
          pip install -r requirements-dev.txt
      - name: Backend tests
        run: cd backend && python3 -m pytest tests/ -q
      - name: Frontend tests
        run: |
          cd rail-frontend
          npm ci
          npm run test -- --run
          npm run build
